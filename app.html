<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Party Biz Hub | Build. Book. Be Paid.</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1b3e;
      --navy-mid: #162d5e;
      --navy-light: #1e3d7a;
      --navy-pale: #F5EAFB;
      --gold: #C9A227;
      --gold-bright: #C9A227;
      --gold-light: #FFF7E0;
      --gold-muted: #C9A227;
      --white: #ffffff;
      --off-white: #FFF6F0;
      --dark: #0a1628;
      --mid: #3d4f6e;
      --muted: #7a8aaa;
      --border: #dde3ef;
      --bg: #FFF6F0;
      --card: #ffffff;
      --success: #1e8c5a;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(15,31,61,0.08);
      --shadow-lg: 0 12px 48px rgba(15,31,61,0.14);
      /* User brand theme (injected via applyBrandTheme) */
      --user-primary: #6A1B9A;
      --user-accent: #C9A227;
      --user-primary-dark: #4A136E;
      --user-primary-contrast: #ffffff;
      --user-accent-contrast: #1a1a1a;
      --user-primary-soft: rgba(106,27,154,0.10);
      --user-accent-soft: rgba(201,162,39,0.16);
      /* Neutral slate palette for quote body */
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-400: #94a3b8;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(180deg, #FFF6F0 0%, #FFFFFF 58%, #FFF6F0 100%);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--user-primary);
      padding: 1.2rem 2.5rem;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(201,162,39,0.45);
      box-shadow: 0 12px 30px rgba(106,27,154,0.14);
    }
    .app-header .app-logo {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--gold-bright));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--white);
      letter-spacing: 0.01em;
    }
    .logo-text span {
      color: #F06292;
    }
    .logo-sub {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
      display: block;
      margin-top: 4px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-badge {
      background: rgba(240,98,146,0.12);
      border: 1px solid rgba(240,98,146,0.34);
      color: #FFFFFF;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.32rem 0.9rem;
      border-radius: 20px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── PROGRESS ── */
    .progress-wrap {
      background: white;
      border-bottom: 1px solid var(--border);
    }
    .progress-steps {
      display: flex;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .prog-step {
      flex: 1;
      padding: 0.85rem 0.3rem;
      text-align: center;
      font-size: clamp(0.62rem, 1.8vw, 0.78rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prog-step.active { color: var(--user-primary); border-bottom-color: var(--user-accent); font-weight: 700; }
    .prog-step.done { color: var(--success); border-bottom-color: var(--success); }
    .step-num {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--navy-pale);
      color: var(--navy-mid);
      font-size: 0.78rem;
      font-weight: 700;
      margin-right: 0.35rem;
      transition: all 0.2s;
    }
    .prog-step.active .step-num { background: var(--user-accent); color: var(--user-accent-contrast); }
    .prog-step.done .step-num { background: var(--success); color: white; }

    /* ── MAIN ── */
    .app-main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* ── PANELS ── */
    .panel { display: none; animation: fadeUp 0.3s ease; }
    .panel.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel-header { margin-bottom: 1.8rem; }
    .panel-eyebrow {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #F06292;
      margin-bottom: 0.35rem;
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--user-primary);
      line-height: 1.15;
    }
    .panel-sub {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 0.5rem;
      line-height: 1.65;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.8rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.2rem;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: clamp(0.75rem, 1.5vw, 0.82rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy-mid);
      margin-bottom: 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .card-title-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--user-accent);
      flex-shrink: 0;
    }

    /* ── FORM ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid.thirds { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 580px) {
      .form-grid, .form-grid.thirds { grid-template-columns: 1fr; }
    }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--mid);
      letter-spacing: 0.03em;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--dark);
      background: white;
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--navy-light);
      box-shadow: 0 0 0 3px rgba(26,50,96,0.1);
    }
    textarea { resize: vertical; min-height: 80px; }

    /* ── LOGO UPLOAD ── */
    .logo-upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.8rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--off-white);
      position: relative;
    }
    .logo-upload-area:hover { border-color: var(--gold); background: var(--gold-light); }
    .logo-upload-area input { display: none; }
    .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .logo-upload-area p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .logo-upload-area p strong { color: var(--navy); }
    #logoPreview { max-height: 65px; max-width: 200px; object-fit: contain; margin: 0 auto; display: none; }

    /* ── DEPOSIT BUTTONS ── */
    .deposit-options { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.4rem; }
    .deposit-btn {
      padding: 0.42rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--mid);
      cursor: pointer;
      transition: all 0.18s;
      background: white;
    }
    .deposit-btn:hover { border-color: var(--navy-light); color: var(--navy); }
    .deposit-btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--gold-bright);
    }

    /* ── SERVICES LAYOUT ── */
    .services-layout {
      display: grid;
      grid-template-columns: 1fr 290px;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 740px) {
      .services-layout { grid-template-columns: 1fr; }
      .quote-live { position: static; }
    }

    /* ── SERVICE CATEGORIES ── */
    .service-category { margin-bottom: 1.2rem; }
    .category-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1.1rem;
      background: var(--user-primary);
      border-radius: 10px;
      margin-bottom: 0.65rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.18s;
    }
    .category-header:hover { background: var(--user-primary-dark); }
    .cat-icon { font-size: 1rem; }
    .cat-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--user-primary-contrast);
      letter-spacing: 0.03em;
      flex: 1;
    }
    .cat-count {
      font-size: 0.78rem;
      color: var(--user-accent);
      font-weight: 600;
      background: var(--user-accent-soft);
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
    }
    .cat-toggle {
      color: var(--user-primary-contrast);
      opacity: 0.6;
      font-size: 0.8rem;
      transition: transform 0.2s;
    }
    .category-header.collapsed .cat-toggle { transform: rotate(-90deg); }

    .service-items { display: flex; flex-direction: column; gap: 0.5rem; }
    .service-items.hidden { display: none; }

    .service-item {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.7rem 1rem;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      transition: all 0.18s;
      cursor: pointer;
    }
    .service-item:hover { border-color: var(--user-primary); background: var(--user-primary-soft); }
    .service-item.selected {
      border-color: var(--user-accent);
      background: var(--user-accent-soft);
    }

    .service-check {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
      flex-shrink: 0;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--user-primary-contrast);
    }
    .service-item.selected .service-check {
      background: var(--user-primary);
      border-color: var(--user-primary);
    }

    .service-info { flex:1; min-width:0; }
    .service-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--dark);
      line-height: 1.35;
      margin-bottom: 0.35rem;
    }
    .service-suggested {
      font-size: 0.8rem;
      color: var(--success);
      font-weight: 600;
      background: rgba(30,140,90,0.09);
      border: 1px solid rgba(30,140,90,0.2);
      border-radius: 5px;
      padding: 3px 8px;
      display: inline-block;
      margin-top: 2px;
      width: fit-content;
    }
    .service-suggested::before {
      content: "Market Rate: ";
      font-weight: 400;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .qty-price-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: flex-end;
      min-width: 140px;
    }
    .qty-price-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .qty-price-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .service-qty, .service-price {
      width: 68px;
      padding: 0.38rem 0.45rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: 0.8rem;
      text-align: center;
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      background: white;
    }
    .service-item.selected .service-qty,
    .service-item.selected .service-price {
      border-color: var(--user-primary);
    }
    .service-qty:focus, .service-price:focus {
      border-color: var(--user-primary);
      outline: none;
    }
    .col-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── LIVE TOTALS ── */
    .quote-live { position: sticky; top: 78px; }
    .totals-card {
      background: var(--user-primary);
      border-radius: var(--radius);
      padding: 1.5rem;
      border: 1px solid var(--user-primary-dark);
    }
    .totals-header {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--user-accent);
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .totals-line {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 0.35rem 0;
      color: var(--user-primary-contrast);
      opacity: 0.85;
      border-bottom: 1px solid rgba(128,128,128,0.15);
    }
    .totals-line.grand {
      font-size: 1rem;
      font-weight: 700;
      color: var(--user-accent);
      opacity: 1;
      padding-top: 0.7rem;
      margin-top: 0.2rem;
      border-top: 1px solid var(--user-accent-soft);
      border-bottom: none;
    }
    .totals-deposit-box {
      background: var(--user-accent-soft);
      border: 1px solid var(--user-accent-soft);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      margin-top: 0.9rem;
      font-size: 0.78rem;
      color: var(--user-primary-contrast);
      opacity: 0.92;
      line-height: 1.6;
    }
    .totals-deposit-box strong { color: var(--user-accent); opacity: 1; }
    .tier-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45rem;
    }
    .tier-btn {
      padding: 0.55rem 0.4rem;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 7px;
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--user-primary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .tier-btn:hover { border-color: var(--user-accent); }
    .tier-btn.active {
      background: var(--user-accent);
      border-color: var(--user-accent);
      color: var(--user-accent-contrast);
    }
    .tier-btn.suggested {
      border-color: var(--user-accent);
      border-width: 2px;
    }
    .tier-btn.missing {
      opacity: 0.55;
      background: #fef2f2;
    }
    .selected-count {
      text-align: center;
      font-size: 0.8rem;
      color: var(--user-primary-contrast);
      opacity: 0.55;
      margin-top: 0.8rem;
    }
    .totals-empty {
      text-align: center;
      padding: 1.5rem 0;
    }
    .totals-empty p { font-size: 0.78rem; color: var(--user-primary-contrast); opacity: 0.55; line-height: 1.6; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.88rem 1.8rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--user-accent), var(--user-accent));
      color: var(--user-accent-contrast);
      box-shadow: 0 4px 16px var(--user-accent-soft);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--user-accent-soft); filter: brightness(1.05); }
    .btn-navy {
      background: var(--user-primary);
      color: var(--user-primary-contrast);
      box-shadow: 0 4px 16px var(--user-primary-soft);
    }
    .btn-navy:hover { background: var(--user-primary-dark); transform: translateY(-2px); }
    .btn-outline {
      background: white;
      color: var(--user-primary);
      border: 2px solid var(--user-primary);
    }
    .btn-outline:hover { background: var(--user-primary-soft); }
    .btn-sm {
      padding: 0.5rem 1.1rem;
      font-size: 0.8rem;
    }
    .btn-row {
      display: flex;
      gap: 0.85rem;
      align-items: center;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    /* ── QUOTE PREVIEW ── */
    #quotePreview {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .qp-header {
      background: var(--user-primary);
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 3px solid var(--user-accent);
    }
    .qp-logo-area img {
      max-height: 52px;
      max-width: 160px;
      object-fit: contain;
      background: white;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .qp-logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--user-accent);
    }
    .qp-contact-block {
      text-align: right;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.8);
      line-height: 1.8;
    }
    .qp-contact-block strong { color: var(--user-primary-contrast); font-size: 0.9rem; display: block; margin-bottom: 2px; }

    .qp-meta-bar {
      background: var(--slate-50);
      padding: 0.75rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--slate-200);
    }
    .qp-meta-left {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--slate-900);
    }
    .qp-meta-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    .qp-quote-num {
      font-size: 0.8rem;
      color: var(--slate-600);
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    .qp-event-badge {
      background: var(--user-primary);
      color: var(--user-accent);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
    }

    .qp-body { padding: 2rem 2.5rem; }

    .qp-client-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--slate-200);
    }
    @media (max-width: 560px) { .qp-client-grid { grid-template-columns: 1fr; } }
    .qp-info-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate-600);
      margin-bottom: 0.25rem;
    }
    .qp-info-value {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--slate-900);
      line-height: 1.4;
    }

    .qp-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .qp-table thead tr { background: var(--slate-700); }
    .qp-table thead th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.09em;

    .qp-totals-row {

    /* ── PAY DEPOSIT BOX ── */
    .qp-pay-box {

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--navy);

      z-index: 9999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── PRINT ── */
    @media print {
      @page { margin: 0.4in; size: letter; }
      /* Hide EVERYTHING by default */
      body * { visibility: hidden !important; }
      /* Then show only the quote preview and its children */
      #panel4, #panel4 *, #quotePreview, #quotePreview * { visibility: visible !important; }
      /* Position the quote at the top-left of the page */
      #panel4 {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      /* Hide buttons/headers inside the quote panel */
      .btn-row, .panel-header { display: none !important; }
      /* Clean quote styling */
      #quotePreview { box-shadow: none !important; border: none !important; margin: 0 !important; }
      body { background: white !important; }
      .qp-table tbody tr:hover { background: unset !important; }
      /* Prevent awkward page breaks */
      .qp-card, .qp-deposit-strip, .qp-pay-box, .qp-footer { page-break-inside: avoid; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {

      .btn-row { flex-direction: column; align-items: stretch; }
      .btn-row .btn { text-align: center; justify-content: center; }
      .header-badge { display: none; }
      .progress-steps { padding: 0 0.5rem; }
      .step-num { display: none; }
      .qp-client-grid { grid-template-columns: 1fr; }
      .qp-totals-row { justify-content: stretch; }
      .qp-totals-box { width: 100%; }
      .qp-deposit-strip { flex-direction: column; }
      .qp-footer { flex-direction: column; text-align: center; gap: 0.3rem; }
    }

      .prog-step span.step-num { display: none; }

    /* Suite topbar */

    .suite-bar-right { display: flex; align-items: center; gap: 1rem; }

    /* Auth gate overlay */
    .auth-gate {

    }
    .auth-gate.hidden { display: none; }
    .auth-spinner {

<script>
const SUPPORT_KB = {
  logo: `<strong>Logo help</strong><br/>Go to your business profile section and upload a PNG logo for the cleanest result. If the preview does not change, upload again and save the profile so the logoDataURL updates across your quotes. For best quality, use a transparent logo with a wide layout.`,
  colors: `<strong>Brand colors</strong><br/>Party Biz Hub should stay consistent: purple dominates <code>#6A1B9A</code>, pink supports <code>#F06292</code>, and gold highlights <code>#C9A227</code>. Keep backgrounds light and let gold be the accent, not the main color.`,
  deposit: `<strong>Deposits</strong><br/>Choose your deposit percentage in the setup section, then connect your Stripe payment links for the fixed deposit tiers. If a payment button is missing, add the correct Stripe URL in your profile first, then refresh the quote preview.`,
  quotes: `<strong>Quote troubleshooting</strong><br/>If totals look off, check service quantity and price fields first. If saved quotes do not appear, make sure you are signed in and the Supabase session is active. For PDF or print issues, generate the quote preview first, then print from the final quote panel.`
};

function toggleSupportPanel(force) {
  const panel = document.getElementById('supportPanel');
  if (!panel) return;
  const willOpen = typeof force === 'boolean' ? force : !panel.classList.contains('open');
  panel.classList.toggle('open', willOpen);
}
function showSupportAnswer(topic) {
  const box = document.getElementById('supportAnswer');
  if (!box) return;
  box.innerHTML = SUPPORT_KB[topic] || SUPPORT_KB.logo;
}
document.addEventListener('click', (e) => {
  const panel = document.getElementById('supportPanel');
  const launcher = document.getElementById('supportLauncher');
  if (!panel || !launcher) return;
  if (!panel.classList.contains('open')) return;
  if (panel.contains(e.target) || launcher.contains(e.target)) return;
  panel.classList.remove('open');
});
</script>
