<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In | Party Biz Hub</title>
<link rel="icon" type="image/png" href="partybizhub-logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --plum-900:#4A2B63;--plum-800:#5A3476;--brand:#6A417E;--brand-deep:#8E67A6;
    --mauve:#A67BB5;--pink:#E6A2BE;--pink-soft:#F4D2DF;
    --gold:#C9A227;--cream:#FCF8F4;
    --ink:#1F1A24;--muted:#6C6473;
    --line:#EAE3ED;--line-strong:#DDD1E5;
    --error:#C23B5E;--success:#1E8C5A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(ellipse 800px 500px at 20% 10%,rgba(230,162,190,.25),transparent 60%),
      radial-gradient(ellipse 700px 400px at 85% 90%,rgba(201,162,39,.12),transparent 55%),
      linear-gradient(155deg,var(--plum-900) 0%,var(--brand) 55%,var(--mauve) 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .auth-card{
    background:#fff;
    border-radius:28px;
    padding:40px 36px;
    width:100%;
    max-width:460px;
    box-shadow:0 40px 100px rgba(31,20,50,.35);
    position:relative;
    overflow:hidden;
  }
  .auth-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,var(--brand),var(--mauve),var(--pink),var(--gold));
  }
  .back-link{
    display:inline-flex;align-items:center;gap:6px;
    font-size:13px;color:var(--muted);text-decoration:none;
    margin-bottom:22px;font-weight:500;transition:color .15s;
  }
  .back-link:hover{color:var(--plum-900)}
  .auth-logo{text-align:center;margin-bottom:20px}
  .auth-logo img{height:72px;width:auto;margin:0 auto}
  .auth-tagline{
    font-family:'Dancing Script',cursive;
    font-size:18px;color:var(--mauve);
    margin-top:4px;
  }
  .auth-tabs{
    display:flex;background:var(--cream);border:1px solid var(--line);
    border-radius:14px;padding:4px;margin-bottom:24px;
  }
  .auth-tab{
    flex:1;padding:10px;text-align:center;font-size:13.5px;font-weight:700;
    color:var(--muted);border-radius:10px;cursor:pointer;transition:all .2s;
    border:none;background:transparent;font-family:inherit;letter-spacing:.01em;
  }
  .auth-tab.active{
    background:#fff;color:var(--plum-900);
    box-shadow:0 4px 14px rgba(90,52,118,.12);
  }
  .form-panel{display:none}
  .form-panel.active{display:block}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  label{font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  input{
    padding:13px 14px;border:1.5px solid var(--line-strong);border-radius:12px;
    font-family:inherit;font-size:15px;color:var(--ink);outline:none;
    transition:all .18s;width:100%;background:#fff;
  }
  input:focus{border-color:var(--mauve);box-shadow:0 0 0 4px rgba(166,123,181,.14)}
  .btn-submit{
    width:100%;background:linear-gradient(135deg,var(--brand),var(--brand-deep));
    color:#fff;border:none;border-radius:14px;padding:15px;
    font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;
    transition:all .2s;margin-top:8px;letter-spacing:.01em;
    box-shadow:0 12px 28px rgba(90,52,118,.32);
  }
  .btn-submit:hover{transform:translateY(-2px);box-shadow:0 16px 36px rgba(90,52,118,.4)}
  .btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .forgot-link{text-align:right;margin-top:-4px;margin-bottom:14px}
  .forgot-link a{font-size:12.5px;color:var(--brand);text-decoration:none;font-weight:700}
  .forgot-link a:hover{text-decoration:underline}
  .message{
    padding:12px 14px;border-radius:12px;font-size:13.5px;
    margin-bottom:14px;display:none;line-height:1.55;font-weight:500;
  }
  .message.error{background:rgba(194,59,94,.08);color:var(--error);border:1px solid rgba(194,59,94,.18);display:block}
  .message.success{background:rgba(30,140,90,.08);color:var(--success);border:1px solid rgba(30,140,90,.18);display:block}
  .auth-footer{
    text-align:center;margin-top:20px;font-size:13px;color:var(--muted);
    padding-top:18px;border-top:1px solid var(--line);
  }
  .auth-footer a{color:var(--brand);font-weight:700;text-decoration:none}
  .auth-footer a:hover{text-decoration:underline}
  .spinner-sm{
    display:inline-block;width:14px;height:14px;
    border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;
    vertical-align:middle;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  #resetPanel{display:none}
  #resetPanel.show{display:block}
  #resetPanel h3{
    font-family:'Playfair Display',serif;font-size:22px;color:var(--plum-900);
    margin-bottom:8px;letter-spacing:-.01em;
  }
  #resetPanel p{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.6}
  .signup-note{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6}
</style>
</head>
<body>

<div class="auth-card">
  <a href="index.html" class="back-link">← Back to Party Biz Hub</a>

  <div class="auth-logo">
    <img src="partybizhub-logo.png" alt="Party Biz Hub"/>
  </div>

  <div class="message" id="authMessage"></div>

  <!-- MAIN AUTH -->
  <div id="mainAuth">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')" id="tabLogin">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')" id="tabSignup">Create Account</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="form-panel active" id="loginPanel">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@yourbusiness.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')handleLogin()"/>
      </div>
      <div class="forgot-link"><a href="#" onclick="showReset();return false;">Forgot password?</a></div>
      <button class="btn-submit" onclick="handleLogin()" id="loginBtn">Sign In to Party Biz Hub →</button>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="form-panel" id="signupPanel">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your full name" autocomplete="name"/>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="you@yourbusiness.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create a password (min 8 chars)" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirm" placeholder="Confirm your password" autocomplete="new-password"
          onkeydown="if(event.key==='Enter')handleSignup()"/>
      </div>
      <button class="btn-submit" onclick="handleSignup()" id="signupBtn">Create My Account</button>
      <p class="signup-note">Already purchased? Use the same email from checkout.</p>
    </div>
  </div>

  <!-- RESET PASSWORD PANEL -->
  <div id="resetPanel">
    <h3>Reset your password</h3>
    <p>Enter the email you signed up with and we'll send you a reset link.</p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="resetEmail" placeholder="you@yourbusiness.com"/>
    </div>
    <button class="btn-submit" onclick="handleReset()" id="resetBtn">Send Reset Link</button>
    <div style="text-align:center;margin-top:14px">
      <a href="#" onclick="hideReset();return false;" style="font-size:13px;color:var(--muted);font-weight:600;text-decoration:none">← Back to sign in</a>
    </div>
  </div>

  <div class="auth-footer">
    Don't have access yet? <a href="index.html#pricing">Become a Founder →</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dmqwoddwzpfnmpjtwiee.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtcXdvZGR3enBmbm1wanR3aWVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Mzk2ODksImV4cCI6MjA5MjExNTY4OX0.pHh7BI25YYlMDqN2FmBsKCrHpvgi7zb3IUizMDUr2K4';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Auto-redirect if already logged in
sb.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const { data: profile } = await sb
    .from('profiles')
    .select('profile_data')
    .eq('id', session.user.id)
    .single();
  const hasBusinessName = profile && profile.profile_data && profile.profile_data.businessName;
  window.location.href = hasBusinessName ? 'app.html' : 'profile.html';
});

function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
  document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
  clearMessage();
}

function showMessage(msg, type) {
  const el = document.getElementById('authMessage');
  el.textContent = msg;
  el.className = `message ${type}`;
}
function clearMessage() {
  const el = document.getElementById('authMessage');
  el.className = 'message';
  el.textContent = '';
}
function setLoading(btnId, loading, defaultText) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner-sm"></span> Please wait...` : defaultText;
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showMessage('Please enter your email and password.', 'error');

  setLoading('loginBtn', true, 'Sign In to Party Biz Hub →');
  clearMessage();

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    setLoading('loginBtn', false, 'Sign In to Party Biz Hub →');
    if (error.message.includes('Invalid login')) {
      showMessage('Incorrect email or password. Try again.', 'error');
    } else if (error.message.includes('Email not confirmed')) {
      showMessage('Please check your email and confirm your account first.', 'error');
    } else {
      showMessage(error.message, 'error');
    }
    return;
  }

  // Check has_paid status
  const { data: profile } = await sb
    .from('profiles')
    .select('has_paid, profile_data')
    .eq('id', data.user.id)
    .single();

  if (!profile?.has_paid) {
    await sb.auth.signOut();
    setLoading('loginBtn', false, 'Sign In to Party Biz Hub →');
    showMessage('No active subscription found. Become a founder to access Party Biz Hub.', 'error');
    return;
  }

  // Smart routing: incomplete profile → profile.html, complete → app.html
  const hasBusinessName = profile.profile_data && profile.profile_data.businessName;
  window.location.href = hasBusinessName ? 'app.html' : 'profile.html';
}

async function handleSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;

  if (!name || !email || !password) return showMessage('Please fill in all fields.', 'error');
  if (password.length < 8) return showMessage('Password must be at least 8 characters.', 'error');
  if (password !== confirm) return showMessage('Passwords do not match.', 'error');

  setLoading('signupBtn', true, 'Create My Account');
  clearMessage();

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: { data: { full_name: name } }
  });

  if (error) {
    setLoading('signupBtn', false, 'Create My Account');
    showMessage(error.message, 'error');
    return;
  }

  setLoading('signupBtn', false, 'Create My Account');
  showMessage('Account created! Check your email to confirm, then sign in.', 'success');
  setTimeout(() => switchTab('login'), 2800);
}

async function handleReset() {
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) return showMessage('Please enter your email address.', 'error');

  setLoading('resetBtn', true, 'Send Reset Link');
  clearMessage();

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });

  setLoading('resetBtn', false, 'Send Reset Link');

  if (error) {
    showMessage(error.message, 'error');
  } else {
    showMessage('Reset link sent! Check your inbox.', 'success');
    setTimeout(hideReset, 2800);
  }
}

function showReset() {
  document.getElementById('mainAuth').style.display = 'none';
  document.getElementById('resetPanel').classList.add('show');
  clearMessage();
}
function hideReset() {
  document.getElementById('mainAuth').style.display = 'block';
  document.getElementById('resetPanel').classList.remove('show');
  clearMessage();
}
</script>

</body>
</html>
